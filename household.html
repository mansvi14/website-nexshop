<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Household - NexShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <style>
        .category-header { margin-top: 80px; padding: 4rem 5%; background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); text-align: center; }
        .category-header h1 { font-size: 3rem; color: #166534; }
        .sub-category { padding-top: 2rem; padding-bottom: 2rem; }
    </style>
    <link rel="stylesheet" href="mega-menu.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="category-header">
        <h1>Household</h1>
        <p style="color:#15803d;">Upgrade your living space today.</p>
    </div>

    <!-- Living Room Decor Section -->
    <section class="featured sub-category section-padding">
        <h2 class="section-title">Living Room Decor</h2>
        <div class="product-slider">
            <div class="product-card">
                <div class="product-img-container"><img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&q=80&w=600" alt="Product"></div>
                <div class="product-details">
                    <p class="brand">HomeAesthetics</p>
                    <h4 class="title">Minimalist Decor Lamp</h4>
                    <div class="price-row"><span class="price">₹3,500.00</span><button class="add-to-cart-btn">Add to Cart</button></div>
                </div>
            </div>
            <div class="product-card">
                <div class="product-img-container"><img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&q=80&w=600" alt="Product"></div>
                <div class="product-details">
                    <p class="brand">CozyHome</p>
                    <h4 class="title">Abstract Wall Art</h4>
                    <div class="price-row"><span class="price">₹1,800.00</span><button class="add-to-cart-btn">Add to Cart</button></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Kitchen Essentials Section -->
    <section class="featured sub-category section-padding" style="background-color: var(--surface-color);">
        <h2 class="section-title">Kitchen Essentials</h2>
        <div class="product-slider">
            <div class="product-card">
                <div class="product-img-container"><img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&q=80&w=600" alt="Product"></div>
                <div class="product-details">
                    <p class="brand">Chef's Pick</p>
                    <h4 class="title">Premium Ceramic Core Set</h4>
                    <div class="price-row"><span class="price">₹8,499.00</span><button class="add-to-cart-btn">Add to Cart</button></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-bottom"><p>&copy; 2026 NexShop. All Rights Reserved.</p></div>
    </footer>
    <script src="script.js"></script>
    <script src="navbar.js"></script>
</body>
</html>
