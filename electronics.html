<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronics - NexShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <style>
        .category-header { margin-top: 80px; padding: 4rem 5%; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); text-align: center; }
        .category-header h1 { font-size: 3rem; color: #f8fafc; }
        .sub-category { padding-top: 2rem; padding-bottom: 2rem; }
    </style>
    <link rel="stylesheet" href="mega-menu.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="category-header">
        <h1>Electronics</h1>
        <p style="color:#94a3b8;">High-end devices for a modern lifestyle.</p>
    </div>

    <!-- New Arrivals Section -->
    <section class="featured sub-category section-padding">
        <h2 class="section-title">New Arrivals</h2>
        <div class="product-slider">
            <div class="product-card">
                <div class="product-img-container"><img src="https://images.unsplash.com/photo-1498049794561-7780e7231661?auto=format&fit=crop&q=80&w=600" alt="Product"></div>
                <div class="product-details">
                    <p class="brand">TechPro</p>
                    <h4 class="title">Noise Cancelling Headphones</h4>
                    <div class="price-row"><span class="price">₹14,999.00</span><button class="add-to-cart-btn">Add to Cart</button></div>
                </div>
            </div>
            <div class="product-card">
                <div class="product-img-container"><img src="https://images.unsplash.com/photo-1498049794561-7780e7231661?auto=format&fit=crop&q=80&w=600" alt="Product"></div>
                <div class="product-details">
                    <p class="brand">SmartLife</p>
                    <h4 class="title">Series 8 Smart Watch</h4>
                    <div class="price-row"><span class="price">₹22,500.00</span><button class="add-to-cart-btn">Add to Cart</button></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Best Sellers Section -->
    <section class="featured sub-category section-padding" style="background-color: var(--surface-color);">
        <h2 class="section-title">Best Sellers</h2>
        <div class="product-slider">
            <div class="product-card">
                <div class="product-img-container"><img src="https://images.unsplash.com/photo-1498049794561-7780e7231661?auto=format&fit=crop&q=80&w=600" alt="Product"></div>
                <div class="product-details">
                    <p class="brand">AudioMax</p>
                    <h4 class="title">Wireless Earbuds Pro</h4>
                    <div class="price-row"><span class="price">₹8,999.00</span><button class="add-to-cart-btn">Add to Cart</button></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-bottom"><p>&copy; 2026 NexShop. All Rights Reserved.</p></div>
    </footer>
    <script src="script.js"></script>
    <script src="navbar.js"></script>
</body>
</html>
