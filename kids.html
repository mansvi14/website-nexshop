<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids' Collection - NexShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <style>
        .category-header { margin-top: 80px; padding: 4rem 5%; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); text-align: center; }
        .category-header h1 { font-size: 3rem; color: #78350f; }
        .sub-category { padding-top: 2rem; padding-bottom: 2rem; }
    </style>
    <link rel="stylesheet" href="mega-menu.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="category-header">
        <h1>Kids' Collection</h1>
        <p style="color:#b45309;">Fun, comfortable, and stylish wear for kids.</p>
    </div>

    <section class="featured sub-category section-padding">
        <h2 class="section-title">T-Shirts</h2>
        <div class="product-slider">
            <div class="product-card">
                <div class="product-img-container"><img src="https://images.unsplash.com/photo-1519689680058-324335c77eba?auto=format&fit=crop&q=80&w=600" alt="Product"></div>
                <div class="product-details">
                    <p class="brand">TinyTots</p>
                    <h4 class="title">Colorful Summer Tee</h4>
                    <div class="price-row"><span class="price">₹650.00</span><button class="add-to-cart-btn">Add to Cart</button></div>
                </div>
            </div>
        </div>
    </section>

    <section class="featured sub-category section-padding" style="background-color: var(--surface-color);">
        <h2 class="section-title">Jeans</h2>
        <div class="product-slider">
            <div class="product-card">
                <div class="product-img-container"><img src="https://images.unsplash.com/photo-1519689680058-324335c77eba?auto=format&fit=crop&q=80&w=600" alt="Product"></div>
                <div class="product-details">
                    <p class="brand">KidDenim</p>
                    <h4 class="title">Stretchy Blue Jeans</h4>
                    <div class="price-row"><span class="price">₹1,100.00</span><button class="add-to-cart-btn">Add to Cart</button></div>
                </div>
            </div>
        </div>
    </section>

    <section class="featured sub-category section-padding">
        <h2 class="section-title">Traditional Wear</h2>
        <div class="product-slider">
            <div class="product-card">
                <div class="product-img-container"><img src="https://images.unsplash.com/photo-1519689680058-324335c77eba?auto=format&fit=crop&q=80&w=600" alt="Product"></div>
                <div class="product-details">
                    <p class="brand">FestiveKids</p>
                    <h4 class="title">Boys Kurta Set</h4>
                    <div class="price-row"><span class="price">₹2,300.00</span><button class="add-to-cart-btn">Add to Cart</button></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-bottom"><p>&copy; 2026 NexShop. All Rights Reserved.</p></div>
    </footer>
    <script src="script.js"></script>
    <script src="navbar.js"></script>
</body>
</html>
